<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <title>Cadastro</title>
</head>
<body>
    
    <main>
        <div id="tela">
        <div id="tela-login">
             <form action="">
             <label for="">Nome</label>
             <input type="text" id="nome" placeholder="Nome:">
             <br>
             <label for="">Email</label>
             <input type="email" id="email" placeholder="Email:">
             <br>
             <label for="">Senha</label>
             <input type="password" id="senha" placeholder="Senha:">
             <div id="mensagem-senha" style="color: #ff4d4d; font-size: 12px; margin-top: 5px; display: none;"></div>
             <br>
             <a href="login.html"><label for="">Já tem login?</label></a>
             <br>
             <button id="btn-auth">Enviar</button>
             </form>
        </div>
        <img src="img/gifTelaLogin.gif" alt="">
        </div>
    </main>

    <script type="module" src="sistema.js"></script>
    
</body>
</html>
