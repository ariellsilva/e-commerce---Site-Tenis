<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="perfil.css">
    <title>Perfil do Usuário</title>
</head>
<body>
<div class="container-perfil">

    <div class="capa">
        <a href="index.html" class="btn-voltar">Menu</a>
    </div>

    <div class="conteudo">
        <div class="foto-perfil">
          
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Foto de Perfil">
        </div>

        <h1 id="exibir-nome">Carregando...</h1>
        
        <div class="info-card">
            <div class="sessao-info">
                <h3>Informações de Contato</h3>
                <p><strong>Email:</strong> <span id="exibir-email">Carregando...</span></p>
                <p><strong>Cargo:</strong> Programadora & Estudante</p>
            </div>
            
            <button id="btn-sair">Sair da Conta</button>
        </div>
    </div>
</div>

<script type="module" src="sistema.js"></script>
    
</body>
</html>
